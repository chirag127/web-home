# Deploy — dispatch to chirag127/workspace umbrella.
# Umbrella runs the actual deploy using umbrella-owned CF secrets.
# Per knowledge/decisions/architecture/agent-tooling/workspace-owns-secrets-2026-07-02.md

name: deploy

on:
  workflow_run:
    workflows: [ci]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  dispatch:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch deploy at umbrella
        env:
          GH_TOKEN: ${{ secrets.WORKSPACE_DISPATCH_PAT }}
        run: |
          gh api repos/chirag127/workspace/dispatches \
            -f event_type=deploy \
            -f "client_payload[repo]=$GITHUB_REPOSITORY" \
            -f "client_payload[sha]=$GITHUB_SHA" \
            -f "client_payload[class]=astro-site"
